<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 2em;
    }

    .error-message {
      display: none;
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #task-form {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    #title {
      flex: 1;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    #title:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    #tasks {
      list-style: none;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 10px;
      background: #f9f9f9;
      transition: all 0.3s;
    }

    .task-item:hover {
      background: #f0f0f0;
      border-color: #ddd;
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #999;
    }

    .task-item input[type='checkbox'] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .task-text {
      flex: 1;
      color: #333;
      word-break: break-word;
    }

    .task-date {
      font-size: 0.85em;
      color: #999;
      white-space: nowrap;
    }

    .delete-btn {
      padding: 6px 12px;
      background: #f44336;
      font-size: 0.9em;
    }

    .delete-btn:hover {
      background: #da190b;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-style: italic;
    }

    .auth-section {
      display: none;
    }

    .auth-section.active {
      display: block;
    }

    .tasks-section {
      display: none;
    }

    .tasks-section.active {
      display: block;
    }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #login-form input {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    #login-form input:focus {
      outline: none;
      border-color: #667eea;
    }

    #login-form button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    #login-form button:hover {
      background: #5568d3;
    }

    .logout-btn {
      margin-top: 20px;
      padding: 8px 16px;
      background: #f44336;
      font-size: 0.9em;
      align-self: flex-end;
    }

    .logout-btn:hover {
      background: #da190b;
    }

    .user-info {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .current-user {
      color: #667eea;
      font-weight: 600;
    }

    .demo-creds {
      font-size: 0.9em;
      color: #999;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
    }

    .demo-creds strong {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Section -->
    <div id="auth-section" class="auth-section active">
      <h1>🔐 Login</h1>

      <div class="error-message" id="auth-error"></div>

      <form id="login-form">
        <input 
          id="username" 
          type="text" 
          placeholder="Username" 
          required 
        />
        <input 
          id="password" 
          type="password" 
          placeholder="Password" 
          required 
        />
        <button type="submit">Sign In</button>
      </form>

      <div class="demo-creds">
        <strong>Demo Credentials:</strong><br>
        demo / password123<br>
        test / test123
      </div>
    </div>

    <!-- Tasks Section -->
    <div id="tasks-section" class="tasks-section">
      <div class="user-info">
        <h1>📝 Tasks</h1>
        <div>
          <span class="current-user" id="current-user"></span>
        </div>
      </div>

      <button id="logout-btn" class="logout-btn">Logout</button>

      <div class="error-message" id="task-error"></div>

      <form id="task-form">
        <input id="title" placeholder="Add a new task..." maxlength="200" />
        <button type="submit">Add</button>
      </form>

      <ul id="tasks"></ul>
    </div>
  </div>

  <script type="module" src="./src/authManager.js"></script>
  <script type="module" src="./src/tasksManager.js"></script>
</body>
</html>
